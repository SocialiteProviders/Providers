name: Test Monorepo Split

on:
  push:
    branches:
      - test/monorepo-split

jobs:
  split:
    name: Test Split Amazon -> SplitTest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install splitsh-lite
        run: |
          wget -qO /tmp/splitsh-lite.tar.gz https://github.com/splitsh/lite/releases/download/v1.0.1/lite_linux_amd64.tar.gz
          tar -zxf /tmp/splitsh-lite.tar.gz --directory /tmp
          sudo mv /tmp/splitsh-lite /usr/local/bin/splitsh-lite
          sudo chmod +x /usr/local/bin/splitsh-lite

      - name: Split Amazon to SplitTest
        run: |
          SHA=$(splitsh-lite --prefix=src/Amazon)
          git remote add split-target "https://${GITHUB_TOKEN}@github.com/SocialiteProviders/SplitTest.git"
          git push split-target "$SHA:refs/heads/master" -f
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_PUSH_TOKEN }}
