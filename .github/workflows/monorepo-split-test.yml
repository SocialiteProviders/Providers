name: Test Monorepo Split

on:
  push:
    branches:
      - test/monorepo-split

jobs:
  split:
    name: Test Split Amazon -> SplitTest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install splitsh-lite
        run: |
          mkdir -p /tmp/splitsh
          wget -qO /tmp/splitsh/splitsh-lite.tar.gz https://github.com/splitsh/lite/releases/download/v1.0.1/lite_linux_amd64.tar.gz
          tar -zxf /tmp/splitsh/splitsh-lite.tar.gz -C /tmp/splitsh
          sudo mv /tmp/splitsh/splitsh-lite /usr/local/bin/splitsh-lite

      - name: Split Amazon to SplitTest
        run: |
          SHA=$(splitsh-lite --prefix=src/Amazon)
          git push --force "https://${GITHUB_TOKEN}@github.com/SocialiteProviders/SplitTest.git" "$SHA:refs/heads/master"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_PUSH_TOKEN }}

      - name: Split Amazon to SplitTestTwo (blank repo)
        run: |
          SHA=$(splitsh-lite --prefix=src/Amazon)
          git push --force "https://${GITHUB_TOKEN}@github.com/SocialiteProviders/SplitTestTwo.git" "$SHA:refs/heads/master"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_PUSH_TOKEN }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Test release (patch Amazon -> SplitTest)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_PUSH_TOKEN }}
          RELEASE_BUMP: patch
          RELEASE_PACKAGES: Amazon
          RELEASE_REPO_MAP: '{"Amazon":"SplitTest"}'
        run: php tools/release.php "${{ github.sha }}" "${{ github.repository }}"
